<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
        }

        .portfolio {
            padding: 60px 10%;
        }

        .portfolio h2 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 32px;
        }

        .video-section,
        .image-section {
            margin-bottom: 60px;
        }

        .video-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .video-item {
            width: 480px;
            max-width: 100%;
            text-align: center;
        }

        .video-item video {
            width: 100%;
            border-radius: 12px;
        }

        .video-caption {
            margin-top: 12px;
            font-size: 16px;
            color: #ccc;
        }

        /* 이미지 영역 */
        .image-container {
            display: flex;
            justify-content: center;
        }

        .image-item {
        width: 960px;
        max-width: 100%;
        text-align: center;
        }

        .image-item img {
            width: 100%;
            border-radius: 12px;
            transition: transform 0.3s ease;
        }

        .image-item img:hover {
            transform: scale(1.05);
        }

        .image-caption {
            margin-top: 12px;
            font-size: 16px;
            color: #ccc;
        }

    </style>
</head>

<body>

    <section class="portfolio">
        <h2>남석희 PORTFOLIO</h2>

        <!-- 🎬 영상 섹션 -->
        <div class="video-section">
            <h3>영상 프로젝트</h3>
            <div class="video-container">

                <div class="video-item">
                    <video controls>
                        <source src="dron.mp4" type="video/mp4">
                    </video>
                    <p class="video-caption">
                        드론 촬영 프로젝트 최종 결과물입니다.
                    </p>
                </div>

                <div class="video-item">
                    <video controls>
                        <source src="making.mp4" type="video/mp4">
                    </video>
                    <p class="video-caption">
                        여기어때Black 숙소 촬영 팀 프로젝트 메이킹 필름 영상입니다.
                    </p>
                </div>
                                <div class="video-item">
                    <video controls>
                        <source src="KoreaNice.mp4" type="video/mp4">
                    </video>
                    <p class="video-caption">
                        애프터이펙트를 활용하여<br> 한국의 위대함을 소개하는 타이포그래피 영상물입니다.
                    </p>
                </div>

            </div>
        </div>

        <!-- 🖼 웹페이지 기획 프로젝트 -->
        <div class="image-section">
            <h3>웹 페이지 기획 프로젝트</h3>
            <div class="image-container">

                <div class="image-item">
                    <img src="game/1.JPG" alt="웹 프로젝트 이미지">
                    <p class="image-caption">
                        <a href="https://tjrgml3632-del.github.io/gameinfo/">https://tjrgml3632-del.github.io/gameinfo/</a>
                        <br><br>게임에 대한 정보를 한 눈에 알아 볼 수 있도록 기획한 웹 페이지 입니다.
                    </p>
                </div>

            </div>
        </div>

    </section>

</body>
</html>
